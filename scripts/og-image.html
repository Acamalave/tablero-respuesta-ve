<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100vw; height: 100vh; overflow: hidden; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #f4f7fc 0%, #e7eefb 100%);
    position: relative; display: flex; align-items: center; gap: 5vw;
    padding: 0 7vw;
  }
  .mark { width: 30vw; height: 30vw; flex-shrink: 0; border-radius: 7vw;
    background: #fff; box-shadow: 0 2vw 5vw -2vw rgba(10,71,166,.28), 0 0 0 1px rgba(10,71,166,.06);
    display: grid; place-items: center; }
  .mark svg, .mark img { width: 92%; height: 92%; object-fit: contain; }
  .text { display: flex; flex-direction: column; }
  .badge { display: inline-flex; align-items: center; gap: .8vw; font-size: 1.5vw; font-weight: 700; color: #0a47a6; letter-spacing: .04em; text-transform: uppercase; margin-bottom: 1.6vw; }
  .badge .dot { width: .9vw; height: .9vw; border-radius: 50%; background: #28d3a7; box-shadow: 0 0 0 .4vw rgba(40,211,167,.18); }
  h1 { font-size: 6.6vw; line-height: .98; font-weight: 900; letter-spacing: -.02em; color: #10243f; }
  h1 .ve { color: #0a47a6; }
  p { margin-top: 2vw; font-size: 2.1vw; line-height: 1.34; color: #41557a; font-weight: 500; }
  .em { font-weight: 800; color: #10243f; }
  .url { position: absolute; right: 7vw; bottom: 4.6vw; font-size: 1.7vw; font-weight: 800; color: #0a47a6; }
</style>
</head>
<body>
  <div class="mark"><img src="../public/logo.jpg" alt="Tarea: Venezuela"></div>
  <div class="text">
    <div class="badge"><span class="dot"></span>Respuesta coordinada al desastre</div>
    <h1>Tarea: <span class="ve">Venezuela</span></h1>
    <p>Coordinación de tareas para ayudar.<br><span class="em">La gente toma tareas</span> y responde.</p>
  </div>
  <div class="url">tareavenezuela.com</div>
</body>
</html>
