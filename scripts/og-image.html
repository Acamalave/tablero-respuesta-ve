<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100vw; height: 100vh; overflow: hidden; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #f4f7fc 0%, #e7eefb 100%);
    position: relative;
  }
  .flag { position: absolute; left: 0; top: 0; bottom: 0; width: 1.5vw; display: flex; flex-direction: column; }
  .flag i { flex: 1; }
  .flag .y { background: #FCD116; }
  .flag .b { background: #00247D; position: relative; }
  .flag .r { background: #CF142B; }
  .stars { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #fff; font-size: .6vw; }
  .wrap { position: absolute; inset: 0; padding: 0 6vw 0 9vw; display: flex; flex-direction: column; justify-content: center; }
  .badge { display: inline-flex; align-items: center; gap: .8vw; font-size: 1.55vw; font-weight: 700; color: #0a47a6; letter-spacing: .04em; text-transform: uppercase; margin-bottom: 1.9vw; }
  .badge .dot { width: .9vw; height: .9vw; border-radius: 50%; background: #28d3a7; box-shadow: 0 0 0 .4vw rgba(40,211,167,.18); }
  h1 { font-size: 7vw; line-height: .98; font-weight: 900; letter-spacing: -.02em; color: #10243f; }
  h1 .ve { color: #0a47a6; }
  p { margin-top: 2.1vw; font-size: 2.25vw; line-height: 1.32; color: #41557a; max-width: 58vw; font-weight: 500; }
  .em { font-weight: 800; color: #10243f; }
  .url { position: absolute; right: 5.5vw; bottom: 4.6vw; font-size: 1.8vw; font-weight: 800; color: #0a47a6; }
</style>
</head>
<body>
  <div class="flag"><i class="y"></i><i class="b"><span class="stars">★★★★★★★★</span></i><i class="r"></i></div>
  <div class="wrap">
    <div class="badge"><span class="dot"></span>Respuesta coordinada al desastre</div>
    <h1>Tarea: <span class="ve">Venezuela</span></h1>
    <p>Coordinación de tareas para ayudar. La organización coordina; <span class="em">la gente toma tareas</span> y responde.</p>
  </div>
  <div class="url">tareavenezuela.com</div>
</body>
</html>
