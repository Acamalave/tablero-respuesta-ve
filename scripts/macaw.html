<!doctype html><html><head><meta charset="utf-8">
<style>
  body{margin:0;background:#e7eefb;display:flex;gap:30px;flex-wrap:wrap;padding:40px;font-family:sans-serif}
  .card{background:#fff;border-radius:20px;padding:24px;box-shadow:0 8px 24px -10px rgba(0,0,0,.2);text-align:center}
  .big{width:220px;height:220px}
  .sm{width:48px;height:48px;border-radius:13px;box-shadow:0 0 0 1px #dfe5ee}
  .row{display:flex;gap:14px;align-items:center;justify-content:center;margin-top:14px}
  h3{font-size:13px;color:#41557a;margin:0 0 10px}
</style></head><body>

<div class="card">
  <h3>A — guacamaya geométrica (perfil)</h3>
  <svg class="big" viewBox="0 0 64 64" id="A"></svg>
  <div class="row">
    <svg class="sm" viewBox="0 0 64 64"></svg>
    <svg class="sm" viewBox="0 0 64 64" style="width:36px;height:36px"></svg>
  </div>
</div>

<script>
  // Logo guacamaya — facetas con tricolor venezolano, perfil mirando a la izquierda.
  const macaw = `
    <!-- cresta de plumas tricolor -->
    <polygon points="30,18 34,2 41,17" fill="#FCD116"/>
    <polygon points="38,16 48,3 50,19" fill="#E4002B"/>
    <polygon points="46,19 58,12 53,28" fill="#1E6BE6"/>
    <!-- cabeza -->
    <path d="M31,15 Q47,15 48,32 Q48,49 30,49 Q20,45 20,33 Q20,20 31,15 Z" fill="#0A47A6"/>
    <!-- parche facial claro -->
    <path d="M30,19 Q18,20 17,30 Q18,40 30,40 Q35,34 35,29 Q35,23 30,19 Z" fill="#EEF3FB"/>
    <!-- pico superior (curvo, gancho) -->
    <path d="M30,21 Q11,19 4,30 Q12,33 19,31 Q25,30 30,27 Z" fill="#171d2b"/>
    <!-- pico inferior -->
    <path d="M19,32 Q10,35 17,39 Q25,39 27,34 Z" fill="#2a3346"/>
    <!-- ojo -->
    <circle cx="29" cy="27" r="3.2" fill="#0c1322"/>
    <circle cx="30.2" cy="25.8" r="1" fill="#fff"/>
  `;
  document.querySelectorAll('svg').forEach(s=>s.innerHTML=macaw);
</script>
</body></html>
