<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1120"/>
      <stop offset="1" stop-color="#05070d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#1E6BE6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#1E6BE6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>
  <!-- Tricolor band emblem -->
  <g transform="translate(116,120)">
    <rect width="280" height="90"  y="0"   rx="14" fill="#FFD100"/>
    <rect width="280" height="90"  y="92"  rx="0"  fill="#0A47A6"/>
    <rect width="280" height="90"  y="184" rx="14" fill="#E4002B"/>
    <!-- 8 stars arc on the blue band -->
    <g fill="#ffffff" transform="translate(140,150)">
      <g id="s"><polygon points="0,-11 2.5,-3.4 10.5,-3.4 4,1.3 6.5,9 0,4.3 -6.5,9 -4,1.3 -10.5,-3.4 -2.5,-3.4"/></g>
    </g>
  </g>
  <!-- Pulse ring (command center) -->
  <circle cx="256" cy="256" r="186" fill="none" stroke="#1E6BE6" stroke-opacity="0.18" stroke-width="2"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="#FFD100" stroke-opacity="0.12" stroke-width="2"/>
</svg>
